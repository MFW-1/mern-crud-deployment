- name: Deploy via SSH
  uses: appleboy/ssh-action@v1.0.0
  with:
    host: ${{ secrets.HOST }}
    username: ${{ secrets.USERNAME }}
    key: ${{ secrets.SSH_KEY }}
    port: ${{ secrets.PORT }}
    script: |
      # Go to your project folder
      cd /home/ubuntu/apps/mern-crud-deployment

      # Pull latest code
      git pull origin main

      # Backend
      cd backend
      npm install
      pm2 restart mern-backend || pm2 start server.js --name mern-backend

      # Frontend
      cd ../frontend
      npm install
      npm run build
