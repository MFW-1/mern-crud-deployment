name: Deploy MERN App

on:
  push:
    branches:
      - main  # Trigger deploy when pushing to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}          # Your server IP
          username: ${{ secrets.USERNAME }}  # Your server username (ubuntu)
          key: ${{ secrets.SSH_KEY }}        # Private key
          port: ${{ secrets.PORT }}          # Usually 22
          script: |
            echo "🔹 Starting deployment"

            # Go to project folder
            cd /home/ubuntu/apps/mern-crud-deployment || exit

            echo "🔹 Pull latest code"
            git reset --hard
            git clean -fd
            git pull origin main

            # Backend
            echo "🔹 Installing backend dependencies"
            cd backend
            npm install

            echo "🔹 Restarting backend with PM2"
            pm2 restart mern-backend || pm2 start server.js --name mern-backend

            # Frontend
            echo "🔹 Installing frontend dependencies"
            cd ../frontend
            npm install

            echo "🔹 Building frontend"
            npm run build

            echo "🔹 Deployment finished"
